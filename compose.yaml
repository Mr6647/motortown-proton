version: '3.8'

services:
  motortown-server:
    build:
      context: .
      # args:
      #   PROTON_VERSION: GE-Proton10-28   # ← change GE-Proton version here if desired

    container_name: motortown-dedicated
    user: "1000:1000"
    restart: unless-stopped

    environment:
      # === REQUIRED Steam credentials (account must own Motor Town) ===
      - STEAM_USERNAME=CHANGE_ME
      - STEAM_PASSWORD=CHANGE_ME
      # - GUARD_CODE=123456               # Only needed first run if Steam Guard is enabled

      # === Motor Town Server Settings ===
      - SERVER_HOSTNAME=Motor Town Private Server
      - SERVER_MESSAGE=Welcome!\nHave fun and drive safe!
      - SERVER_PASSWORD=
      - MAX_PLAYERS=12
      - MAX_PLAYER_VEHICLES=6
      - ALLOW_COMPANY_VEHCILES=false
      - ALLOW_COMPANY_AI=true
      - MAX_HOUSING_RENTAL_PLOTS=2
      - MAX_HOUSING_RENTAL_DAYS=14
      - HOUSING_RENTAL_PRICE_RATIO=0.1
      - ALLOW_MODDED_VEHICLES=false
      - NPC_VEHICLE_DENSITY=0.8
      - NPC_POLICE_DENSITY=1.0
      - ENABLE_WEB_API=false
      - WEB_API_PASSWORD=supersecret123
      - WEB_API_PORT=8080

      # === Advanced ===
      - STEAMAPPVALIDATE=0
      # - MT_CFG_URL=https://example.com/your-config-bundle.tgz

    ports:
      - "7777:7777/tcp"
      - "7777:7777/udp"
      - "27015:27015/tcp"
      - "27015:27015/udp"
      # - "8080:8080/tcp"   # only if ENABLE_WEB_API=true

    volumes:
      # ──────────────────────────────────────────────────────────────
      # OPTION 1: Persistent BIND MOUNT (uncomment to enable)
      # Recommended if you want to easily edit files/configs/hooks on the host
      # - ./motortown-data:/home/steam/server
      # ──────────────────────────────────────────────────────────────

      # OPTION 2: Named volume (Docker-managed persistence) – active by default
      - motortown-data:/home/steam/server

    stdin_open: true
    tty: true

# Named volume definition (required when using Option 2 above)
volumes:
  motortown-data:
